<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillMitra Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .card { border: none; border-radius: 12px; transition: 0.3s; }
        .btn-primary { border-radius: 8px; padding: 10px 20px; }
        /* Professional Nav Pill Styles */
        .nav-pills .nav-link { color: #6c757d; font-weight: 500; }
        .nav-pills .nav-link.active { background-color: #198754 !important; color: white !important; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom py-3 sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3 text-success" href="{% url 'dashboard' %}">SkillMitra</a>
            
            <div class="d-flex align-items-center">
                <div class="nav-pills d-flex bg-light rounded-pill p-1 me-4">
                    <a class="nav-link rounded-pill px-4 {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}" 
                       href="{% url 'dashboard' %}">Home</a>
                    
                    <a class="nav-link rounded-pill px-4 {% if request.resolver_match.url_name == 'browse' %}active{% endif %}" 
                       href="{% url 'browse' %}">Browse</a>
                    
                    <a class="nav-link rounded-pill px-4 {% if request.resolver_match.url_name == 'add_skill' %}active{% endif %}" 
                       href="{% url 'add_skill' %}">+ Add Skill</a>
                    
                    <a class="nav-link rounded-pill px-4 {% if request.resolver_match.url_name == 'my_profile' %}active{% endif %}" 
                       href="{% url 'my_profile' %}">Profile</a>
                </div>

                <span class="badge bg-success-subtle text-success border border-success px-3 py-2 rounded-pill me-3">
                    {{ user.profile.points }} pts
                </span>

                {% if user.is_authenticated %}
                <form action="{% url 'logout' %}" method="post" class="d-inline">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-secondary btn-sm rounded-pill">Logout</button>
                </form>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm border-0 rounded-4" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
